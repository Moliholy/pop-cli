name: ci

on:
  push:
    branches:
      - main
      - fix/ci
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

env:
  CARGO_TERM_COLOR: always
  GITHUB_ACTOR: pop-cli
  CARGO_INCREMENTAL: 0
  CACHE_KEY: shared-cache

concurrency:
  # Cancel any in-progress jobs for the same pull request
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          components: rustfmt
          override: true

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  build:
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Check no default features
        run: cargo check --no-default-features
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Check contracts feature
        run: cargo check --no-default-features --features contract
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Check polkavm-contracts feature
        run: cargo check --no-default-features --features "polkavm-contracts, v6" -p pop-cli -p pop-contracts
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Check chain feature
        run: cargo check --no-default-features --features chain
        env:
          RUSTFLAGS: "-Dwarnings"

      - name: Check default features
        run: cargo check
        env:
          RUSTFLAGS: "-Dwarnings"

  clippy:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Annotate with Clippy warnings
        uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          RUSTFLAGS: "-Wmissing_docs"

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --no-default-features

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v5

  docs:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Check no default features
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-Dwarnings"
          RUSTFLAGS: "-Dmissing_docs"

  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Run unit tests (no default features)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-Dwarnings"
        run: cargo nextest run --lib --bins --no-default-features

      - name: Run unit tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUSTFLAGS: "-Dwarnings"
        run: cargo nextest run --lib --bins --no-default-features --features "contract,chain"

  polkavm-unit-tests:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Run unit tests for polkavm-contracts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo nextest run --lib --bins --no-default-features --features "polkavm-contracts, v6" -p pop-cli -p pop-contracts

  coverage:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Generate code coverage
        run: cargo llvm-cov --workspace --lib --bins --no-default-features --features "default chain telemetry v5 wasm-contracts wallet-integration" --codecov --output-path codecov.json

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: true

  documentation-tests:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/moliholy/ci:latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          cache-all-crates: true
          key: ${{ env.CACHE_KEY }}

      - name: Run doc tests
        run: cargo test --doc

  contract-integration-tests:
    needs: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          default: true
          target: wasm32-unknown-unknown
          components: rust-src, clippy

      - name: Install packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install packages (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install protobuf
          protoc --version

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo nextest run --no-default-features --features contract --test contract

  chain-integration-tests:
    needs: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          default: true
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Install packages (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install packages (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install protobuf
          protoc --version

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run integration tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo nextest run --no-default-features --features chain --test chain
          cargo nextest run --no-default-features --features chain --test metadata
